site_name: Percentify
site_description: Exploratory stats and data-quality diagnostics for pandas and Polars DataFrames. One call each.
site_url: https://data-centt.github.io/percentify/
repo_url: https://github.com/data-centt/percentify
repo_name: data-centt/percentify

theme:
  name: material
  logo: asset/favicon.png
  favicon: asset/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Documentation: documentation.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search
